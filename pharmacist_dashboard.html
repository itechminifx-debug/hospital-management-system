<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacist Dashboard | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --danger: #dc2626; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header .user-info { display: flex; align-items: center; gap: 8px; background: var(--primary-light); padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; color: var(--primary-dark); }
        .header .btn-logout { background: none; border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .welcome-bar { background: linear-gradient(135deg, #d97706, #b45309); border-radius: 20px; padding: 24px 28px; margin-bottom: 24px; color: white; }
        .welcome-bar h1 { font-size: 22px; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; display: flex; align-items: center; gap: 14px; }
        .stat-card .stat-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .stat-card .stat-value { font-size: 24px; font-weight: 800; color: var(--text); } .stat-card .stat-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .module-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; text-decoration: none; transition: all 0.2s; display: flex; flex-direction: column; gap: 6px; }
        .module-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); border-color: var(--primary); }
        .module-card .mod-icon { font-size: 28px; } .module-card .mod-name { font-size: 14px; font-weight: 700; color: var(--text); } .module-card .mod-desc { font-size: 11px; color: var(--text-light); }
        .section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
        @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div>
        <div style="display:flex;align-items:center;gap:12px;"><div class="user-info">💊 <span id="userDisplay">Pharmacist</span></div><button class="btn-logout" onclick="logout()">🚪 Logout</button></div>
    </div>
    <div class="main">
        <div class="welcome-bar"><h1>Good <span id="greeting">morning</span>, Pharmacist 👋</h1><p style="opacity:0.9;font-size:13px;">Pharmacy dashboard</p></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon" style="background:#ecfdf5;color:#059669;">💊</div><div><div class="stat-value" id="totalDrugs">0</div><div class="stat-label">Total Drugs</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#fef2f2;color:#dc2626;">⚠️</div><div><div class="stat-value" id="lowStock">0</div><div class="stat-label">Low Stock</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:#d97706;">📅</div><div><div class="stat-value" id="expiringSoon">0</div><div class="stat-label">Expiring Soon</div></div></div>
        </div>
        <div class="section-title">📋 Your Module</div>
        <div class="module-grid">
            <a href="pharmacy.html" class="module-card"><div class="mod-icon">💊</div><div class="mod-name">Pharmacy</div><div class="mod-desc">Drug inventory & dispensing</div></a>
        </div>
    </div>
    <script>
        window.onload = function() {
            document.getElementById('userDisplay').textContent = (JSON.parse(localStorage.getItem('hospital_current_user'))||{}).username || 'pharmacist';
            var hour = new Date().getHours();
            document.getElementById('greeting').textContent = hour < 12 ? 'morning' : (hour < 17 ? 'afternoon' : 'evening');
            var pharmacy = JSON.parse(localStorage.getItem('hospital_pharmacy')) || [];
            document.getElementById('totalDrugs').textContent = pharmacy.length;
            document.getElementById('lowStock').textContent = pharmacy.filter(function(d){ return (parseInt(d.quantity)||0) <= (parseInt(d.reorderLevel)||5); }).length;
            var now = new Date();
            document.getElementById('expiringSoon').textContent = pharmacy.filter(function(d){ return d.expiryDate && new Date(d.expiryDate) <= new Date(now.getTime() + 30*24*60*60*1000); }).length;
        };
        function logout() { localStorage.removeItem('hospital_current_user'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
