<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #2563eb; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
        .stat-card .value { font-size: 22px; font-weight: 800; color: var(--text); }
        .stat-card .label { font-size: 10px; color: var(--text-light); text-transform: uppercase; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-group.full { grid-column: span 2; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; transition: all 0.2s; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); } .btn-warning { background: var(--warning); }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-paid { background: #d1fae5; color: #065f46; } .badge-pending { background: #fef3c7; color: #92400e; } .badge-nhis { background: #dbeafe; color: #1e40af; }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; margin: 1px; }
        .btn-pay { background: #d1fae5; color: #065f46; } .btn-receipt { background: #dbeafe; color: #1e40af; } .btn-del { background: #fee2e2; color: #991b1b; }
        
        /* RECEIPT MODAL */
        .receipt-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; padding: 20px; }
        .receipt-overlay.show { display: flex; }
        .receipt { background: white; border-radius: 16px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .receipt .receipt-header { text-align: center; border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; margin-bottom: 15px; }
        .receipt .receipt-header h2 { color: var(--primary); font-size: 20px; }
        .receipt .receipt-header .hospital { font-weight: 700; font-size: 14px; color: var(--text); }
        .receipt .receipt-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
        .receipt .receipt-row .label { color: var(--text-light); } .receipt .receipt-row .val { color: var(--text); font-weight: 600; }
        .receipt .receipt-total { text-align: center; margin-top: 15px; padding-top: 15px; border-top: 2px solid var(--primary); }
        .receipt .receipt-total .big { font-size: 26px; font-weight: 800; color: var(--success); }
        .receipt .btn-close { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; }
        
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        
        @media print { body * { visibility: hidden; } .receipt-overlay, .receipt-overlay * { visibility: visible; } .receipt-overlay { position: absolute; top: 0; left: 0; background: white; } .receipt { box-shadow: none; } .btn-close, .btn-print { display: none !important; } }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } .stats-row { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div class="header"><div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div><a href="dashboard.html">← Dashboard</a></div>

    <div class="main">
        <div class="page-header"><h1>💰 Billing & Payments</h1></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('records')">📋 Billing Records</button>
            <button class="tab" onclick="switchTab('new')">➕ New Bill</button>
        </div>

        <!-- RECORDS PANEL -->
        <div id="panel-records" class="panel active">
            <div class="stats-row">
                <div class="stat-card" style="border-left:4px solid var(--primary);"><div class="value" id="sTotalBilled">GHS 0</div><div class="label">Total Billed</div></div>
                <div class="stat-card" style="border-left:4px solid var(--success);"><div class="value" id="sTotalPaid">GHS 0</div><div class="label">Total Collected</div></div>
                <div class="stat-card" style="border-left:4px solid var(--warning);"><div class="value" id="sTotalPending">GHS 0</div><div class="label">Pending</div></div>
                <div class="stat-card" style="border-left:4px solid var(--info);"><div class="value" id="sTotalNHIS">GHS 0</div><div class="label">NHIS Claims</div></div>
            </div>
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Bill ID</th><th>Patient</th><th>Service</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="billingTableBody"><tr><td colspan="8" style="text-align:center;color:#999;">Loading...</td></tr></tbody></table></div></div>
        </div>

        <!-- NEW BILL PANEL -->
        <div id="panel-new" class="panel">
            <div class="card">
                <h3>📝 Create New Bill</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Patient *</label><select id="billPatient"><option value="">Select Patient</option></select></div>
                    <div class="form-group"><label>Service Rendered *</label><select id="billService"><option value="">Select Service</option><option value="Consultation">Consultation</option><option value="Laboratory Test">Laboratory Test</option><option value="X-Ray / Scan">X-Ray / Scan</option><option value="Medication">Medication / Drugs</option><option value="Admission Fee">Admission Fee</option><option value="Ward Stay (per day)">Ward Stay (per day)</option><option value="Surgery">Surgery</option><option value="Antenatal">Antenatal Care</option><option value="Vaccination">Vaccination</option><option value="Dressing">Wound Dressing</option><option value="Other">Other Service</option></select></div>
                    <div class="form-group"><label>Amount (GHS) *</label><input type="number" id="billAmount" placeholder="0.00" step="0.01"></div>
                    <div class="form-group"><label>Payment Method</label><select id="billMethod"><option value="Cash">Cash</option><option value="NHIS">NHIS</option><option value="Mobile Money">Mobile Money</option><option value="Bank Transfer">Bank Transfer</option></select></div>
                    <div class="form-group"><label>Payment Status</label><select id="billStatus"><option value="Paid">Paid</option><option value="Pending">Pending</option></select></div>
                    <div class="form-group full"><label>Additional Notes</label><input type="text" id="billNotes" placeholder="Any additional notes..."></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="createBill()">💾 Save Bill</button>
                    <button class="btn btn-primary" onclick="createBillAndReceipt()">🧾 Save & Print Receipt</button>
                    <button class="btn btn-danger" onclick="switchTab('records')">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- RECEIPT OVERLAY -->
    <div class="receipt-overlay" id="receiptOverlay">
        <div class="receipt" id="receiptContent"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function getBills() { return JSON.parse(localStorage.getItem('hospital_billing')) || []; }
        function saveBills(data) { localStorage.setItem('hospital_billing', JSON.stringify(data)); }
        function getPatients() { return JSON.parse(localStorage.getItem('hospital_patients')) || []; }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'records') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-records').classList.add('active'); loadBillingTable(); }
            else { document.querySelector('.tabs .tab:last-child').classList.add('active'); document.getElementById('panel-new').classList.add('active'); loadPatientDropdown(); }
        }

        function loadPatientDropdown() {
            var sel = document.getElementById('billPatient');
            sel.innerHTML = '<option value="">Select Patient</option>';
            getPatients().forEach(function(p){ sel.innerHTML += '<option value="'+p.id+'">'+p.firstName+' '+p.lastName+' ('+p.id+')</option>'; });
        }

        function createBill() {
            var patientId = document.getElementById('billPatient').value;
            var service = document.getElementById('billService').value;
            var amount = parseFloat(document.getElementById('billAmount').value) || 0;
            if (!patientId || !service || amount <= 0) { showToast('Fill all required fields!', 'error'); return; }
            
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var bill = {
                id: 'BIL-' + Date.now(),
                patientId: patientId,
                patientName: patient ? patient.firstName+' '+patient.lastName : '',
                service: service,
                amount: amount,
                paymentMethod: document.getElementById('billMethod').value,
                paymentStatus: document.getElementById('billStatus').value,
                notes: document.getElementById('billNotes').value.trim(),
                paymentDate: document.getElementById('billStatus').value==='Paid' ? new Date().toLocaleDateString() : '',
                createdAt: new Date().toLocaleDateString()
            };
            
            var bills = getBills(); bills.push(bill); saveBills(bills);
            clearBillForm(); switchTab('records');
            showToast('✅ Bill created for ' + bill.patientName);
        }

        function createBillAndReceipt() {
            var patientId = document.getElementById('billPatient').value;
            var service = document.getElementById('billService').value;
            var amount = parseFloat(document.getElementById('billAmount').value) || 0;
            if (!patientId || !service || amount <= 0) { showToast('Fill all required fields!', 'error'); return; }
            
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var bill = {
                id: 'BIL-' + Date.now(), patientId: patientId,
                patientName: patient ? patient.firstName+' '+patient.lastName : '',
                service: service, amount: amount,
                paymentMethod: document.getElementById('billMethod').value,
                paymentStatus: 'Paid',
                notes: document.getElementById('billNotes').value.trim(),
                paymentDate: new Date().toLocaleDateString(),
                createdAt: new Date().toLocaleDateString()
            };
            
            var bills = getBills(); bills.push(bill); saveBills(bills);
            clearBillForm();
            showReceipt(bill);
        }

        function clearBillForm() { document.getElementById('billAmount').value = ''; document.getElementById('billNotes').value = ''; }

        function loadBillingTable() {
            var bills = getBills();
            bills.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
            
            var totalBilled = 0, totalPaid = 0, totalPending = 0, totalNHIS = 0;
            bills.forEach(function(b){ totalBilled += b.amount; if (b.paymentStatus==='Paid') totalPaid += b.amount; else totalPending += b.amount; if (b.paymentMethod==='NHIS') totalNHIS += b.amount; });
            document.getElementById('sTotalBilled').textContent = 'GHS ' + totalBilled.toLocaleString();
            document.getElementById('sTotalPaid').textContent = 'GHS ' + totalPaid.toLocaleString();
            document.getElementById('sTotalPending').textContent = 'GHS ' + totalPending.toLocaleString();
            document.getElementById('sTotalNHIS').textContent = 'GHS ' + totalNHIS.toLocaleString();

            var tbody = document.getElementById('billingTableBody');
            if (bills.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">No bills</td></tr>'; return; }
            var html = '';
            bills.forEach(function(b){
                var sc = 'badge-paid'; if (b.paymentStatus==='Pending') sc='badge-pending'; if (b.paymentMethod==='NHIS') sc='badge-nhis';
                html += '<tr><td><strong>'+b.id+'</strong></td><td>'+b.patientName+'</td><td>'+b.service+'</td><td><strong>GHS '+b.amount.toFixed(2)+'</strong></td><td>'+b.paymentMethod+'</td><td>'+b.createdAt+'</td><td><span class="badge '+sc+'">'+b.paymentStatus+'</span></td><td>';
                if (b.paymentStatus !== 'Paid') html += '<button class="btn-sm btn-pay" onclick="markPaid(\''+b.id+'\')">✅ Pay</button> ';
                html += '<button class="btn-sm btn-receipt" onclick="showReceiptById(\''+b.id+'\')">🧾 Receipt</button> ';
                html += '<button class="btn-sm btn-del" onclick="deleteBill(\''+b.id+'\')">🗑</button></td></tr>';
            });
            tbody.innerHTML = html;
        }

        function markPaid(id) {
            if (!confirm('Mark this bill as PAID?')) return;
            var bills = getBills();
            var bill = bills.find(function(b){ return b.id === id; });
            if (bill) { bill.paymentStatus = 'Paid'; bill.paymentDate = new Date().toLocaleDateString(); saveBills(bills); loadBillingTable(); showToast('✅ Bill marked as PAID!'); }
        }

        function showReceiptById(id) {
            var bills = getBills();
            var bill = bills.find(function(b){ return b.id === id; });
            if (bill) showReceipt(bill);
        }

        function showReceipt(bill) {
            var patient = getPatients().find(function(p){ return p.id === bill.patientId; });
            var html = '';
            html += '<div class="receipt-header">';
            html += '<div class="hospital">🏥 Hospital Management System</div>';
            html += '<h2>PAYMENT RECEIPT</h2>';
            html += '<small style="color:#64748b;">Receipt #: ' + bill.id + '</small>';
            html += '</div>';
            html += '<div class="receipt-row"><span class="label">Patient</span><span class="val">' + bill.patientName + '</span></div>';
            html += '<div class="receipt-row"><span class="label">Patient ID</span><span class="val">' + bill.patientId + '</span></div>';
            html += '<div class="receipt-row"><span class="label">Service</span><span class="val">' + bill.service + '</span></div>';
            html += '<div class="receipt-row"><span class="label">Payment Method</span><span class="val">' + bill.paymentMethod + '</span></div>';
            html += '<div class="receipt-row"><span class="label">Date</span><span class="val">' + (bill.paymentDate || bill.createdAt) + '</span></div>';
            if (bill.notes) html += '<div class="receipt-row"><span class="label">Notes</span><span class="val">' + bill.notes + '</span></div>';
            html += '<div class="receipt-total"><div style="font-size:12px;color:#64748b;">TOTAL AMOUNT</div><div class="big">GHS ' + bill.amount.toFixed(2) + '</div></div>';
            html += '<div style="text-align:center;margin-top:15px;font-size:11px;color:#999;">Thank you for your payment</div>';
            html += '<button onclick="printReceipt()" style="width:100%;padding:12px;background:#0891b2;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;">🖨️ Print Receipt</button>';
            html += '<button onclick="closeReceipt()" style="width:100%;padding:10px;background:#e2e8f0;color:#1e293b;border:none;border-radius:8px;margin-top:6px;cursor:pointer;">✕ Close</button>';
            
            document.getElementById('receiptContent').innerHTML = html;
            document.getElementById('receiptOverlay').classList.add('show');
        }

        function printReceipt() { window.print(); }
        function closeReceipt() { document.getElementById('receiptOverlay').classList.remove('show'); }

        function deleteBill(id) { if (!confirm('Delete this bill?')) return; var bills = getBills().filter(function(b){ return b.id !== id; }); saveBills(bills); loadBillingTable(); showToast('Bill deleted.'); }
        function showToast(msg, type) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; t.style.background = type === 'error' ? '#dc2626' : '#1e293b'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadBillingTable(); };
    </script>
</body>
</html>
