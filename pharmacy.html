<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #2563eb; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        
        .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; transition: all 0.2s; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-stock { background: #d1fae5; color: #065f46; } .badge-low { background: #fef3c7; color: #92400e; } .badge-out { background: #fee2e2; color: #991b1b; }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; margin: 1px; }
        .btn-dispense { background: #dbeafe; color: #1e40af; } .btn-del { background: #fee2e2; color: #991b1b; }
        
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        
        @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header"><div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div><a href="dashboard.html">← Dashboard</a></div>

    <div class="main">
        <div class="page-header"><h1>💊 Pharmacy & Drug Inventory</h1></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('inventory')">📋 Drug Inventory</button>
            <button class="tab" onclick="switchTab('add')">➕ Add Drug</button>
        </div>

        <!-- INVENTORY PANEL -->
        <div id="panel-inventory" class="panel active">
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Drug Name</th><th>Category</th><th>Batch</th><th>Qty</th><th>Unit Price</th><th>Selling Price</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead><tbody id="pharmacyTableBody"><tr><td colspan="9" style="text-align:center;color:#999;">Loading...</td></tr></tbody></table></div></div>
        </div>

        <!-- ADD DRUG PANEL -->
        <div id="panel-add" class="panel">
            <div class="card">
                <h3>📝 Add New Drug</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Drug Name *</label><input type="text" id="drugName" placeholder="e.g., Paracetamol"></div>
                    <div class="form-group"><label>Category</label><select id="drugCategory"><option value="">Select</option><option value="Painkiller">Painkiller</option><option value="Antibiotic">Antibiotic</option><option value="Antimalarial">Antimalarial</option><option value="Antiviral">Antiviral</option><option value="Anti-inflammatory">Anti-inflammatory</option><option value="Vitamin">Vitamin/Supplement</option><option value="Other">Other</option></select></div>
                    <div class="form-group"><label>Manufacturer</label><input type="text" id="manufacturer" placeholder="e.g., GSK"></div>
                    <div class="form-group"><label>Batch Number</label><input type="text" id="batchNumber" placeholder="Batch #"></div>
                    <div class="form-group"><label>Quantity *</label><input type="number" id="quantity" placeholder="0" min="0"></div>
                    <div class="form-group"><label>Unit Price (GHS)</label><input type="number" id="unitPrice" placeholder="0.00" step="0.01"></div>
                    <div class="form-group"><label>Selling Price (GHS)</label><input type="number" id="sellingPrice" placeholder="0.00" step="0.01"></div>
                    <div class="form-group"><label>Expiry Date</label><input type="date" id="expiryDate"></div>
                    <div class="form-group"><label>Reorder Level</label><input type="number" id="reorderLevel" placeholder="5" min="0" value="5"></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="addDrug()">💾 Save Drug</button>
                    <button class="btn btn-primary" onclick="addDrugAndNew()">💾 Save & New</button>
                    <button class="btn btn-danger" onclick="switchTab('inventory')">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        function getPharmacy() { return JSON.parse(localStorage.getItem('hospital_pharmacy')) || []; }
        function savePharmacy(data) { localStorage.setItem('hospital_pharmacy', JSON.stringify(data)); }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'inventory') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-inventory').classList.add('active'); loadPharmacyTable(); }
            else { document.querySelector('.tabs .tab:last-child').classList.add('active'); document.getElementById('panel-add').classList.add('active'); }
        }

        function addDrug() {
            var name = document.getElementById('drugName').value.trim();
            var qty = parseInt(document.getElementById('quantity').value) || 0;
            if (!name) { showToast('Enter drug name!'); return; }
            if (qty <= 0) { showToast('Enter quantity!'); return; }
            
            var drug = {
                id: 'DRG-' + String(getPharmacy().length + 1).padStart(3, '0'),
                drugName: name,
                category: document.getElementById('drugCategory').value,
                manufacturer: document.getElementById('manufacturer').value.trim(),
                batchNumber: document.getElementById('batchNumber').value.trim(),
                quantity: qty,
                unitPrice: parseFloat(document.getElementById('unitPrice').value) || 0,
                sellingPrice: parseFloat(document.getElementById('sellingPrice').value) || 0,
                expiryDate: document.getElementById('expiryDate').value,
                reorderLevel: parseInt(document.getElementById('reorderLevel').value) || 5,
                dateAdded: new Date().toLocaleDateString()
            };
            
            var pharmacy = getPharmacy(); pharmacy.push(drug); savePharmacy(pharmacy);
            clearDrugForm(); switchTab('inventory');
            showToast('✅ ' + name + ' added to inventory!');
        }

        function addDrugAndNew() {
            var name = document.getElementById('drugName').value.trim();
            var qty = parseInt(document.getElementById('quantity').value) || 0;
            if (!name || qty <= 0) { showToast('Enter drug name and quantity!'); return; }
            
            var drug = { id: 'DRG-' + String(getPharmacy().length + 1).padStart(3, '0'), drugName: name, category: document.getElementById('drugCategory').value, manufacturer: document.getElementById('manufacturer').value.trim(), batchNumber: document.getElementById('batchNumber').value.trim(), quantity: qty, unitPrice: parseFloat(document.getElementById('unitPrice').value) || 0, sellingPrice: parseFloat(document.getElementById('sellingPrice').value) || 0, expiryDate: document.getElementById('expiryDate').value, reorderLevel: parseInt(document.getElementById('reorderLevel').value) || 5, dateAdded: new Date().toLocaleDateString() };
            
            var pharmacy = getPharmacy(); pharmacy.push(drug); savePharmacy(pharmacy);
            clearDrugForm(); showToast('✅ Saved! Add another.');
        }

        function clearDrugForm() {
            ['drugName','manufacturer','batchNumber','unitPrice','sellingPrice'].forEach(function(id){ document.getElementById(id).value = ''; });
            document.getElementById('quantity').value = ''; document.getElementById('drugCategory').value = '';
            document.getElementById('expiryDate').value = '';
        }

        function loadPharmacyTable() {
            var pharmacy = getPharmacy();
            var tbody = document.getElementById('pharmacyTableBody');
            if (pharmacy.length === 0) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#999;padding:20px;">No drugs in inventory</td></tr>'; return; }
            var html = '';
            pharmacy.forEach(function(d){
                var qty = parseInt(d.quantity) || 0;
                var reorder = parseInt(d.reorderLevel) || 5;
                var sc = 'badge-stock'; if (qty <= reorder) sc = 'badge-low'; if (qty <= 0) sc = 'badge-out';
                var statusText = qty > reorder ? 'In Stock' : (qty > 0 ? 'Low Stock' : 'Out of Stock');
                html += '<tr><td><strong>'+d.drugName+'</strong></td><td>'+(d.category||'-')+'</td><td>'+(d.batchNumber||'-')+'</td><td><strong>'+qty+'</strong></td><td>GHS '+(d.unitPrice||0).toFixed(2)+'</td><td>GHS '+(d.sellingPrice||0).toFixed(2)+'</td><td>'+(d.expiryDate||'-')+'</td><td><span class="badge '+sc+'">'+statusText+'</span></td><td><button class="btn-sm btn-dispense" onclick="dispenseDrug(\''+d.id+'\')">💊 Dispense</button> <button class="btn-sm btn-del" onclick="deleteDrug(\''+d.id+'\')">🗑</button></td></tr>';
            });
            tbody.innerHTML = html;
        }

        function dispenseDrug(id) {
            var pharmacy = getPharmacy();
            var drug = pharmacy.find(function(d){ return d.id === id; });
            if (!drug) return;
            var qty = parseInt(prompt('How many units of ' + drug.drugName + ' to dispense? (Current stock: ' + drug.quantity + ')'));
            if (!qty || qty <= 0) return;
            if (qty > drug.quantity) { showToast('Not enough stock! Only ' + drug.quantity + ' available.'); return; }
            drug.quantity -= qty;
            savePharmacy(pharmacy);
            loadPharmacyTable();
            showToast('✅ Dispensed ' + qty + ' units of ' + drug.drugName);
        }

        function deleteDrug(id) { if (!confirm('Delete this drug?')) return; var pharmacy = getPharmacy().filter(function(d){ return d.id !== id; }); savePharmacy(pharmacy); loadPharmacyTable(); showToast('Drug deleted.'); }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadPharmacyTable(); };
    </script>
</body>
</html>
