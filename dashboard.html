<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #2563eb; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header .user-info { display: flex; align-items: center; gap: 8px; background: var(--primary-light); padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; color: var(--primary-dark); }
        .header .btn-logout { background: none; border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-light); }
        
        .main { max-width: 1300px; margin: 0 auto; padding: 24px 20px; }
        
        .welcome-bar { background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 20px; padding: 24px 28px; margin-bottom: 24px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .welcome-bar h1 { font-size: 22px; font-weight: 700; }
        .welcome-bar .role-badge { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; display: flex; align-items: center; gap: 14px; }
        .stat-card .stat-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .stat-card .stat-value { font-size: 24px; font-weight: 800; color: var(--text); }
        .stat-card .stat-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; }
        
        .section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
        .module-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; text-decoration: none; transition: all 0.2s; display: flex; flex-direction: column; gap: 6px; }
        .module-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); border-color: var(--primary); }
        .module-card .mod-icon { font-size: 28px; }
        .module-card .mod-name { font-size: 14px; font-weight: 700; color: var(--text); }
        .module-card .mod-desc { font-size: 11px; color: var(--text-light); }
        
        @media (max-width: 850px) { .stats-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 500px) { .stats-grid { grid-template-columns: 1fr; } .module-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div>
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="user-info">👤 <span id="userDisplay">Admin</span> · <span id="roleDisplay">Administrator</span></div>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="welcome-bar">
            <div>
                <h1>Welcome, <span id="greetingName">Admin</span> 👋</h1>
                <p style="opacity:0.9;font-size:13px;margin-top:4px;">Department Dashboard</p>
            </div>
            <div class="role-badge" id="roleBadge">🔑 Administrator</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon" style="background:#ecfdf5;color:#059669;">👥</div><div><div class="stat-value" id="totalPatients">0</div><div class="stat-label">Patients</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#eff6ff;color:#2563eb;">📅</div><div><div class="stat-value" id="todayAppts">0</div><div class="stat-label">Today's Appts</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:#d97706;">🛏️</div><div><div class="stat-value" id="availableBeds">0</div><div class="stat-label">Available Beds</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#fef2f2;color:#dc2626;">💊</div><div><div class="stat-value" id="lowStock">0</div><div class="stat-label">Low Stock</div></div></div>
        </div>

        <div class="section-title">📋 Your Modules</div>
        <div class="module-grid" id="moduleGrid"></div>
    </div>

    <script>
        // Define all modules with role access
        var allModules = [
            { id: 'patients', name: 'Patients', icon: '👥', desc: 'Records & registration', roles: ['Admin','Doctor','Nurse','Receptionist'] },
            { id: 'appointments', name: 'Appointments', icon: '📅', desc: 'Schedule visits', roles: ['Admin','Doctor','Receptionist'] },
            { id: 'staff', name: 'Staff', icon: '👨‍⚕️', desc: 'Doctors & nurses', roles: ['Admin'] },
            { id: 'pharmacy', name: 'Pharmacy', icon: '💊', desc: 'Drug inventory', roles: ['Admin','Pharmacist','Doctor'] },
            { id: 'wards', name: 'Wards', icon: '🛏️', desc: 'Bed management', roles: ['Admin','Nurse','Doctor'] },
            { id: 'billing', name: 'Billing', icon: '💰', desc: 'Invoices & receipts', roles: ['Admin','Receptionist','Accountant'] },
            { id: 'laboratory', name: 'Laboratory', icon: '🔬', desc: 'Tests & results', roles: ['Admin','Lab Technician','Doctor'] },
            { id: 'vitals', name: 'Vital Signs', icon: '❤️', desc: 'BP, Temp, Pulse', roles: ['Admin','Doctor','Nurse'] },
            { id: 'medical_history', name: 'Medical History', icon: '📋', desc: 'Past visits', roles: ['Admin','Doctor'] },
            { id: 'reports', name: 'Reports', icon: '📊', desc: 'Analytics', roles: ['Admin'] },
            { id: 'admin', name: 'Settings', icon: '⚙️', desc: 'System config', roles: ['Admin'] }
        ];

        window.onload = function() {
            var user = JSON.parse(localStorage.getItem('hospital_current_user')) || { username: 'admin', role: 'Admin' };
            document.getElementById('userDisplay').textContent = user.username;
            document.getElementById('roleDisplay').textContent = user.role;
            document.getElementById('greetingName').textContent = user.username;
            document.getElementById('roleBadge').textContent = '🔑 ' + user.role;

            // Filter modules by role
            var userModules = allModules.filter(function(m){ return m.roles.indexOf(user.role) !== -1; });
            var grid = document.getElementById('moduleGrid');
            var html = '';
            userModules.forEach(function(m){
                html += '<a href="'+m.id+'.html" class="module-card"><div class="mod-icon">'+m.icon+'</div><div class="mod-name">'+m.name+'</div><div class="mod-desc">'+m.desc+'</div></a>';
            });
            grid.innerHTML = html;

            // Stats
            var patients = JSON.parse(localStorage.getItem('hospital_patients')) || [];
            var appointments = JSON.parse(localStorage.getItem('hospital_appointments')) || [];
            var pharmacy = JSON.parse(localStorage.getItem('hospital_pharmacy')) || [];
            var wards = JSON.parse(localStorage.getItem('hospital_wards')) || [];
            
            document.getElementById('totalPatients').textContent = patients.length;
            var today = new Date().toLocaleDateString();
            document.getElementById('todayAppts').textContent = appointments.filter(function(a){ return a.appointmentDate === today; }).length;
            
            var totalBeds = wards.reduce(function(s,w){ return s + (parseInt(w.totalBeds)||0); }, 0);
            var occupied = wards.reduce(function(s,w){ return s + (parseInt(w.occupiedBeds)||0); }, 0);
            document.getElementById('availableBeds').textContent = totalBeds - occupied;
            document.getElementById('lowStock').textContent = pharmacy.filter(function(d){ return (parseInt(d.quantity)||0) <= (parseInt(d.reorderLevel)||5); }).length;
        };

        function logout() { localStorage.removeItem('hospital_current_user'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
