<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wards | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --success: #059669; --warning: #d97706; --danger: #dc2626; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-available { background: #d1fae5; color: #065f46; } .badge-full { background: #fee2e2; color: #991b1b; }
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="header"><div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div><a href="dashboard.html">← Dashboard</a></div>
    <div class="main">
        <div class="page-header"><h1>🛏️ Wards & Bed Management</h1></div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('list')">📋 Wards</button>
            <button class="tab" onclick="switchTab('add')">➕ Add Ward</button>
        </div>

        <div id="panel-list" class="panel active">
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Ward</th><th>Type</th><th>Floor</th><th>Total Beds</th><th>Occupied</th><th>Available</th><th>Status</th><th>Actions</th></tr></thead><tbody id="wardsTableBody"><tr><td colspan="8" style="text-align:center;color:#999;">Loading...</td></tr></tbody></table></div></div>
        </div>

        <div id="panel-add" class="panel">
            <div class="card"><h3>➕ Add New Ward</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Ward Name *</label><input type="text" id="wardName" placeholder="e.g., Male Ward"></div>
                    <div class="form-group"><label>Ward Type</label><select id="wardType"><option value="General">General</option><option value="Private">Private</option><option value="Maternity">Maternity</option><option value="ICU">ICU</option><option value="Pediatric">Pediatric</option></select></div>
                    <div class="form-group"><label>Floor</label><input type="text" id="floorNumber" placeholder="e.g., 1st Floor"></div>
                    <div class="form-group"><label>Total Beds *</label><input type="number" id="totalBeds" placeholder="0" min="1"></div>
                    <div class="form-group"><label>Nurse In Charge</label><input type="text" id="nurseInCharge" placeholder="Nurse name"></div>
                    <button class="btn btn-success" onclick="addWard()" style="height:42px;">➕ Add</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        function getWards() { return JSON.parse(localStorage.getItem('hospital_wards')) || []; }
        function saveWards(data) { localStorage.setItem('hospital_wards', JSON.stringify(data)); }
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'list') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-list').classList.add('active'); loadWardsTable(); }
            else { document.querySelector('.tabs .tab:last-child').classList.add('active'); document.getElementById('panel-add').classList.add('active'); }
        }
        function addWard() {
            var name = document.getElementById('wardName').value.trim();
            var beds = parseInt(document.getElementById('totalBeds').value) || 0;
            if (!name || beds <= 0) { showToast('Enter ward name and beds!'); return; }
            var ward = { id: 'WRD-' + String(getWards().length + 1).padStart(3, '0'), wardName: name, wardType: document.getElementById('wardType').value, floorNumber: document.getElementById('floorNumber').value.trim(), totalBeds: beds, occupiedBeds: 0, nurseInCharge: document.getElementById('nurseInCharge').value.trim() };
            var wards = getWards(); wards.push(ward); saveWards(wards);
            document.getElementById('wardName').value = ''; document.getElementById('totalBeds').value = '';
            switchTab('list'); showToast('✅ Ward added!');
        }
        function loadWardsTable() {
            var wards = getWards();
            var tbody = document.getElementById('wardsTableBody');
            if (wards.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">No wards</td></tr>'; return; }
            var html = '';
            wards.forEach(function(w){
                var available = w.totalBeds - (w.occupiedBeds || 0);
                var status = available > 0 ? 'Available' : 'Full';
                html += '<tr><td><strong>'+w.wardName+'</strong></td><td>'+w.wardType+'</td><td>'+(w.floorNumber||'-')+'</td><td>'+w.totalBeds+'</td><td>'+(w.occupiedBeds||0)+'</td><td><strong>'+available+'</strong></td><td><span class="badge '+(status==='Available'?'badge-available':'badge-full')+'">'+status+'</span></td><td><button class="btn-sm btn-primary" style="background:#0891b2;color:white;" onclick="admitPatient(\''+w.id+'\')">➕ Admit</button> <button class="btn-sm btn-danger" style="background:#fee2e2;color:#991b1b;" onclick="deleteWard(\''+w.id+'\')">🗑</button></td></tr>';
            });
            tbody.innerHTML = html;
        }
        function admitPatient(wardId) {
            var patients = JSON.parse(localStorage.getItem('hospital_patients')) || [];
            var names = patients.map(function(p){ return p.firstName+' '+p.lastName+' ('+p.id+')'; });
            var sel = prompt('Enter patient name to admit:\n\nAvailable patients:\n' + names.join('\n'));
            if (!sel) return;
            var wards = getWards();
            var ward = wards.find(function(w){ return w.id === wardId; });
            if (ward && ward.occupiedBeds < ward.totalBeds) { ward.occupiedBeds = (ward.occupiedBeds || 0) + 1; saveWards(wards); loadWardsTable(); showToast('✅ Patient admitted to ' + ward.wardName); }
            else { showToast('❌ Ward is full!'); }
        }
        function deleteWard(id) { if (!confirm('Delete this ward?')) return; var wards = getWards().filter(function(w){ return w.id !== id; }); saveWards(wards); loadWardsTable(); showToast('Ward deleted.'); }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadWardsTable(); };
    </script>
</body>
</html>
