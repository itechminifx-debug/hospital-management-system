<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #2563eb; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header .brand span { color: var(--primary); }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        
        .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; color: white; transition: all 0.2s; }
        .btn-primary { background: var(--primary); } .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); } .btn-danger { background: var(--danger); }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(8,145,178,0.06); }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group.full { grid-column: span 3; }
        .form-group.half { grid-column: span 2; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        table tbody tr:hover td { background: #f8fafc; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-active { background: #d1fae5; color: #065f46; } .badge-inactive { background: #f4f4f5; color: #52525b; }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-edit { background: #e0e7ff; color: #4338ca; } .btn-del { background: #fee2e2; color: #991b1b; } .btn-view { background: #d1fae5; color: #065f46; }
        
        .search-bar { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; margin-bottom: 16px; display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; border: none; }
        .search-bar input:focus { outline: none; }
        
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; font-weight: 600; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        
        @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr 1fr; } .form-group.full, .form-group.half { grid-column: span 2; } }
        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } .form-group.full, .form-group.half { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div>
        <a href="dashboard.html">← Dashboard</a>
    </div>

    <div class="main">
        <div class="page-header">
            <h1>👥 Patients</h1>
            <button class="btn btn-primary" onclick="switchTab('register')">➕ Register Patient</button>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('records')">📋 Patient Records</button>
            <button class="tab" id="tabRegister" onclick="switchTab('register')">➕ New Registration</button>
        </div>

        <!-- RECORDS PANEL -->
        <div id="panel-records" class="panel active">
            <div class="search-bar">
                <input type="text" id="searchPatient" placeholder="🔍 Search by name, ID, phone..." oninput="loadPatientTable()">
            </div>
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Patient ID</th><th>Name</th><th>Gender</th><th>Age</th><th>Phone</th><th>Blood Group</th><th>Status</th><th>Actions</th></tr></thead><tbody id="patientTableBody"><tr><td colspan="8" style="text-align:center;color:#999;">Loading...</td></tr></tbody></table></div></div>
        </div>

        <!-- REGISTRATION PANEL -->
        <div id="panel-register" class="panel">
            <div class="card">
                <h3>📝 Patient Registration Form</h3>
                <div class="form-grid">
                    <div class="form-group"><label>First Name *</label><input type="text" id="firstName" placeholder="First name"></div>
                    <div class="form-group"><label>Last Name *</label><input type="text" id="lastName" placeholder="Last name"></div>
                    <div class="form-group"><label>Date of Birth</label><input type="date" id="dob"></div>
                    <div class="form-group"><label>Gender</label><select id="gender"><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
                    <div class="form-group"><label>Phone Number</label><input type="text" id="phone" placeholder="0244-123-456"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="email@example.com"></div>
                    <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="House address"></div>
                    <div class="form-group"><label>City/Town</label><input type="text" id="city" placeholder="City"></div>
                    <div class="form-group"><label>Region</label><select id="region"><option value="">Select</option><option value="Greater Accra">Greater Accra</option><option value="Ashanti">Ashanti</option><option value="Central">Central</option><option value="Eastern">Eastern</option><option value="Western">Western</option><option value="Volta">Volta</option><option value="Northern">Northern</option></select></div>
                    <div class="form-group"><label>Blood Group</label><select id="bloodGroup"><option value="">Unknown</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option></select></div>
                    <div class="form-group"><label>Genotype</label><select id="genotype"><option value="">Unknown</option><option value="AA">AA</option><option value="AS">AS</option><option value="SS">SS</option></select></div>
                    <div class="form-group"><label>NHIS Number</label><input type="text" id="nhisNumber" placeholder="NHIS card number"></div>
                    <div class="form-group"><label>Occupation</label><input type="text" id="occupation" placeholder="Occupation"></div>
                    <div class="form-group"><label>Emergency Contact</label><input type="text" id="emergencyContact" placeholder="Name & phone"></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="registerPatient()">💾 Register Patient</button>
                    <button class="btn btn-primary" onclick="registerAndNew()">💾 Save & New</button>
                    <button class="btn btn-danger" onclick="switchTab('records')">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function getPatients() { return JSON.parse(localStorage.getItem('hospital_patients')) || []; }
        function savePatients(data) { localStorage.setItem('hospital_patients', JSON.stringify(data)); }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'records') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-records').classList.add('active'); loadPatientTable(); }
            else { document.getElementById('tabRegister').classList.add('active'); document.getElementById('panel-register').classList.add('active'); }
        }

        function generatePatientID() {
            var patients = getPatients();
            return 'HOSP-' + new Date().getFullYear() + '-' + String(patients.length + 1).padStart(4, '0');
        }

        function registerPatient() {
            var firstName = document.getElementById('firstName').value.trim();
            var lastName = document.getElementById('lastName').value.trim();
            if (!firstName || !lastName) { showToast('Please enter patient name!'); return; }
            
            var patient = {
                id: generatePatientID(),
                firstName: firstName, lastName: lastName,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                address: document.getElementById('address').value.trim(),
                city: document.getElementById('city').value.trim(),
                region: document.getElementById('region').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                genotype: document.getElementById('genotype').value,
                nhisNumber: document.getElementById('nhisNumber').value.trim(),
                occupation: document.getElementById('occupation').value.trim(),
                emergencyContact: document.getElementById('emergencyContact').value.trim(),
                status: 'Active',
                registeredDate: new Date().toLocaleDateString()
            };
            
            var patients = getPatients();
            patients.push(patient);
            savePatients(patients);
            clearForm();
            switchTab('records');
            showToast('✅ Patient ' + firstName + ' ' + lastName + ' registered!');
        }

        function registerAndNew() {
            var firstName = document.getElementById('firstName').value.trim();
            var lastName = document.getElementById('lastName').value.trim();
            if (!firstName || !lastName) { showToast('Please enter patient name!'); return; }
            
            var patient = {
                id: generatePatientID(), firstName: firstName, lastName: lastName,
                dob: document.getElementById('dob').value, gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value.trim(), email: document.getElementById('email').value.trim(),
                address: document.getElementById('address').value.trim(), city: document.getElementById('city').value.trim(),
                region: document.getElementById('region').value, bloodGroup: document.getElementById('bloodGroup').value,
                genotype: document.getElementById('genotype').value, nhisNumber: document.getElementById('nhisNumber').value.trim(),
                occupation: document.getElementById('occupation').value.trim(),
                emergencyContact: document.getElementById('emergencyContact').value.trim(),
                status: 'Active', registeredDate: new Date().toLocaleDateString()
            };
            
            var patients = getPatients(); patients.push(patient); savePatients(patients);
            clearForm();
            showToast('✅ Saved! Register another patient.');
        }

        function clearForm() {
            ['firstName','lastName','phone','email','address','city','nhisNumber','occupation','emergencyContact'].forEach(function(id){ document.getElementById(id).value = ''; });
            document.getElementById('dob').value = ''; document.getElementById('gender').value = '';
            document.getElementById('region').value = ''; document.getElementById('bloodGroup').value = '';
            document.getElementById('genotype').value = '';
        }

        function loadPatientTable() {
            var patients = getPatients();
            var search = (document.getElementById('searchPatient').value || '').toLowerCase();
            if (search) patients = patients.filter(function(p){ return (p.firstName+' '+p.lastName).toLowerCase().includes(search) || p.id.toLowerCase().includes(search) || (p.phone||'').includes(search); });
            var tbody = document.getElementById('patientTableBody');
            if (patients.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">No patients found</td></tr>'; return; }
            var html = '';
            patients.forEach(function(p){
                var age = p.dob ? Math.floor((new Date() - new Date(p.dob)) / (365.25 * 24 * 60 * 60 * 1000)) : '-';
                html += '<tr><td><strong>'+p.id+'</strong></td><td>'+p.firstName+' '+p.lastName+'</td><td>'+(p.gender||'-')+'</td><td>'+age+'</td><td>'+(p.phone||'-')+'</td><td>'+(p.bloodGroup||'-')+'</td><td><span class="badge '+(p.status==='Active'?'badge-active':'badge-inactive')+'">'+(p.status||'Active')+'</span></td><td><button class="btn-sm btn-view" onclick="viewPatient(\''+p.id+'\')">👁</button> <button class="btn-sm btn-del" onclick="deletePatient(\''+p.id+'\')">🗑</button></td></tr>';
            });
            tbody.innerHTML = html;
        }

        function deletePatient(id) { if (!confirm('Delete this patient?')) return; var patients = getPatients().filter(function(p){ return p.id !== id; }); savePatients(patients); loadPatientTable(); showToast('Patient deleted.'); }
        function viewPatient(id) { localStorage.setItem('hospital_view_patient', id); window.location.href = 'patient_view.html'; }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadPatientTable(); };
    </script>
</body>
</html>
