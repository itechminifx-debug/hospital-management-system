<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reception Dashboard | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header .user-info { display: flex; align-items: center; gap: 8px; background: var(--primary-light); padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; color: var(--primary-dark); }
        .header .btn-logout { background: none; border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .welcome-bar { background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 20px; padding: 24px 28px; margin-bottom: 24px; color: white; }
        .welcome-bar h1 { font-size: 22px; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; display: flex; align-items: center; gap: 14px; }
        .stat-card .stat-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .stat-card .stat-value { font-size: 24px; font-weight: 800; color: var(--text); } .stat-card .stat-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .module-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; text-decoration: none; transition: all 0.2s; display: flex; flex-direction: column; gap: 6px; }
        .module-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); border-color: var(--primary); }
        .module-card .mod-icon { font-size: 28px; } .module-card .mod-name { font-size: 14px; font-weight: 700; color: var(--text); } .module-card .mod-desc { font-size: 11px; color: var(--text-light); }
        @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div>
        <div style="display:flex;align-items:center;gap:12px;"><div class="user-info">🛎️ <span id="userDisplay">Receptionist</span></div><button class="btn-logout" onclick="logout()">🚪 Logout</button></div>
    </div>
    <div class="main">
        <div class="welcome-bar"><h1>Good <span id="greeting">morning</span>, Receptionist 👋</h1><p style="opacity:0.9;font-size:13px;">Front desk dashboard</p></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon" style="background:#ecfdf5;color:#059669;">👥</div><div><div class="stat-value" id="totalPatients">0</div><div class="stat-label">Registered Today</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#eff6ff;color:#2563eb;">📅</div><div><div class="stat-value" id="todayAppts">0</div><div class="stat-label">Today's Appointments</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#d1fae5;color:#059669;">💰</div><div><div class="stat-value" id="billsToday">0</div><div class="stat-label">Bills Today</div></div></div>
        </div>
        <div class="section-title">📋 Your Modules</div>
        <div class="module-grid">
            <a href="patients.html" class="module-card"><div class="mod-icon">👥</div><div class="mod-name">Patients</div><div class="mod-desc">Register & view</div></a>
            <a href="appointments.html" class="module-card"><div class="mod-icon">📅</div><div class="mod-name">Appointments</div><div class="mod-desc">Schedule visits</div></a>
            <a href="billing.html" class="module-card"><div class="mod-icon">💰</div><div class="mod-name">Billing</div><div class="mod-desc">Invoices & receipts</div></a>
        </div>
    </div>
    <script>
        window.onload = function() {
            document.getElementById('userDisplay').textContent = (JSON.parse(localStorage.getItem('hospital_current_user'))||{}).username || 'reception';
            var hour = new Date().getHours();
            document.getElementById('greeting').textContent = hour < 12 ? 'morning' : (hour < 17 ? 'afternoon' : 'evening');
            var today = new Date().toLocaleDateString();
            document.getElementById('totalPatients').textContent = (JSON.parse(localStorage.getItem('hospital_patients'))||[]).filter(function(p){ return p.registeredDate === today; }).length;
            document.getElementById('todayAppts').textContent = (JSON.parse(localStorage.getItem('hospital_appointments'))||[]).filter(function(a){ return a.appointmentDate === today; }).length;
            document.getElementById('billsToday').textContent = (JSON.parse(localStorage.getItem('hospital_billing'))||[]).filter(function(b){ return b.createdAt === today; }).length;
        };
        function logout() { localStorage.removeItem('hospital_current_user'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
