<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical History | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #2563eb; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        .page-header p { font-size: 13px; color: var(--text-light); margin-top: 4px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .form-group.full { grid-column: span 2; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; transition: all 0.2s; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        table tbody tr:hover td { background: #f8fafc; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-diagnosis { background: #dbeafe; color: #1e40af; } .badge-treatment { background: #d1fae5; color: #065f46; } .badge-followup { background: #fef3c7; color: #92400e; }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-del { background: #fee2e2; color: #991b1b; }
        
        .patient-card { background: var(--primary-light); border: 1px solid var(--primary); border-radius: 14px; padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .patient-card .p-info { font-size: 14px; }
        .patient-card .p-name { font-weight: 700; color: var(--text); }
        
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div>
        <a href="dashboard.html">← Dashboard</a>
    </div>

    <div class="main">
        <div class="page-header">
            <h1>📋 Medical History</h1>
            <p>View and record patient visit history, diagnoses, and treatments.</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('add')">➕ Add Record</button>
            <button class="tab" onclick="switchTab('view')">📋 View All Records</button>
        </div>

        <!-- ADD RECORD PANEL -->
        <div id="panel-add" class="panel active">
            <div class="card">
                <h3>📝 Record Patient Visit</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Patient *</label><select id="histPatient" onchange="showPatientInfo()"><option value="">Select Patient</option></select></div>
                    <div class="form-group"><label>Visit Date *</label><input type="date" id="histDate"></div>
                    <div class="form-group"><label>Attending Doctor</label><input type="text" id="histDoctor" placeholder="Doctor's name"></div>
                    <div class="form-group"><label>Follow-Up Date</label><input type="date" id="histFollowUp"></div>
                    <div class="form-group full"><label>Diagnosis *</label><input type="text" id="histDiagnosis" placeholder="e.g., Malaria, Hypertension, Typhoid"></div>
                    <div class="form-group full"><label>Treatment / Prescription</label><textarea id="histTreatment" placeholder="Treatment given or drugs prescribed..."></textarea></div>
                    <div class="form-group full"><label>Additional Notes</label><textarea id="histNotes" placeholder="Any additional observations..."></textarea></div>
                </div>
                <div class="patient-card" id="patientInfoCard" style="display:none;"></div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="addHistory()">💾 Save Record</button>
                    <button class="btn btn-primary" onclick="addHistoryAndNew()">💾 Save & New</button>
                </div>
            </div>
        </div>

        <!-- VIEW RECORDS PANEL -->
        <div id="panel-view" class="panel">
            <div class="card">
                <h3>🔍 Search Patient History</h3>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <select id="searchPatient" onchange="loadHistoryTable()" style="padding:10px;border:1px solid var(--border);border-radius:10px;flex:1;min-width:200px;">
                        <option value="">All Patients</option>
                    </select>
                </div>
            </div>
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Date</th><th>Patient</th><th>Doctor</th><th>Diagnosis</th><th>Treatment</th><th>Follow-Up</th><th>Actions</th></tr></thead><tbody id="historyTableBody"><tr><td colspan="7" style="text-align:center;color:#999;">Select a patient to view history</td></tr></tbody></table></div></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        function getHistory() { return JSON.parse(localStorage.getItem('hospital_medical_history')) || []; }
        function saveHistory(data) { localStorage.setItem('hospital_medical_history', JSON.stringify(data)); }
        function getPatients() { return JSON.parse(localStorage.getItem('hospital_patients')) || []; }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'add') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-add').classList.add('active'); loadPatientDropdowns(); }
            else { document.querySelector('.tabs .tab:last-child').classList.add('active'); document.getElementById('panel-view').classList.add('active'); loadSearchDropdown(); }
        }

        function loadPatientDropdowns() {
            var sel = document.getElementById('histPatient');
            sel.innerHTML = '<option value="">Select Patient</option>';
            getPatients().forEach(function(p){ sel.innerHTML += '<option value="'+p.id+'">'+p.firstName+' '+p.lastName+' ('+p.id+')</option>'; });
        }

        function loadSearchDropdown() {
            var sel = document.getElementById('searchPatient');
            sel.innerHTML = '<option value="">All Patients</option>';
            getPatients().forEach(function(p){ sel.innerHTML += '<option value="'+p.id+'">'+p.firstName+' '+p.lastName+'</option>'; });
        }

        function showPatientInfo() {
            var id = document.getElementById('histPatient').value;
            var patient = getPatients().find(function(p){ return p.id === id; });
            var card = document.getElementById('patientInfoCard');
            if (patient) {
                card.style.display = 'flex';
                card.innerHTML = '<div class="p-info"><div class="p-name">'+patient.firstName+' '+patient.lastName+'</div><small>'+patient.id+' · '+(patient.gender||'')+' · '+(patient.bloodGroup||'')+'</small></div><div><small>Phone: '+(patient.phone||'N/A')+'</small></div>';
            } else { card.style.display = 'none'; }
        }

        function addHistory() {
            var patientId = document.getElementById('histPatient').value;
            var diagnosis = document.getElementById('histDiagnosis').value.trim();
            if (!patientId || !diagnosis) { showToast('Select patient and enter diagnosis!'); return; }
            
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var record = {
                id: 'HST-' + Date.now(),
                patientId: patientId,
                patientName: patient ? patient.firstName+' '+patient.lastName : '',
                visitDate: document.getElementById('histDate').value || new Date().toLocaleDateString(),
                doctorName: document.getElementById('histDoctor').value.trim(),
                diagnosis: diagnosis,
                treatment: document.getElementById('histTreatment').value.trim(),
                notes: document.getElementById('histNotes').value.trim(),
                followUpDate: document.getElementById('histFollowUp').value,
                createdAt: new Date().toLocaleDateString()
            };
            
            var history = getHistory(); history.push(record); saveHistory(history);
            clearHistoryForm(); switchTab('view');
            showToast('✅ Medical record saved for ' + record.patientName);
        }

        function addHistoryAndNew() {
            var patientId = document.getElementById('histPatient').value;
            var diagnosis = document.getElementById('histDiagnosis').value.trim();
            if (!patientId || !diagnosis) { showToast('Select patient and enter diagnosis!'); return; }
            
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var record = { id: 'HST-' + Date.now(), patientId: patientId, patientName: patient ? patient.firstName+' '+patient.lastName : '', visitDate: document.getElementById('histDate').value || new Date().toLocaleDateString(), doctorName: document.getElementById('histDoctor').value.trim(), diagnosis: diagnosis, treatment: document.getElementById('histTreatment').value.trim(), notes: document.getElementById('histNotes').value.trim(), followUpDate: document.getElementById('histFollowUp').value, createdAt: new Date().toLocaleDateString() };
            
            var history = getHistory(); history.push(record); saveHistory(history);
            clearHistoryForm(); showToast('✅ Saved! Add another record.');
        }

        function clearHistoryForm() { document.getElementById('histDiagnosis').value = ''; document.getElementById('histTreatment').value = ''; document.getElementById('histNotes').value = ''; document.getElementById('histDoctor').value = ''; }

        function loadHistoryTable() {
            var patientId = document.getElementById('searchPatient').value;
            var history = getHistory();
            history.sort(function(a,b){ return new Date(b.visitDate) - new Date(a.visitDate); });
            if (patientId) history = history.filter(function(h){ return h.patientId === patientId; });
            
            var tbody = document.getElementById('historyTableBody');
            if (history.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;padding:20px;">No records found</td></tr>'; return; }
            var html = '';
            history.forEach(function(h){
                html += '<tr><td>'+h.visitDate+'</td><td><strong>'+h.patientName+'</strong></td><td>'+(h.doctorName||'-')+'</td><td>'+h.diagnosis+'</td><td>'+(h.treatment||'-')+'</td><td>'+(h.followUpDate||'-')+'</td><td><button class="btn-sm btn-del" onclick="deleteHistory(\''+h.id+'\')">🗑</button></td></tr>';
            });
            tbody.innerHTML = html;
        }

        function deleteHistory(id) { if (!confirm('Delete this record?')) return; var history = getHistory().filter(function(h){ return h.id !== id; }); saveHistory(history); loadHistoryTable(); showToast('Record deleted.'); }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadPatientDropdowns(); };
    </script>
</body>
</html>
