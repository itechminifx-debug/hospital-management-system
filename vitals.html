<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Signs | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --success: #059669; --warning: #d97706; --danger: #dc2626; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-group.full { grid-column: span 3; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-normal { background: #d1fae5; color: #065f46; } .badge-high { background: #fee2e2; color: #991b1b; } .badge-low { background: #fef3c7; color: #92400e; }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-del { background: #fee2e2; color: #991b1b; }
        
        .vital-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
        .vital-card .vital-icon { font-size: 28px; margin-bottom: 4px; }
        .vital-card .vital-val { font-size: 20px; font-weight: 800; color: var(--text); }
        .vital-card .vital-label { font-size: 9px; color: var(--text-light); text-transform: uppercase; }
        
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        
        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr 1fr; } .form-group.full { grid-column: span 2; } }
        @media (max-width: 450px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="header"><div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div><a href="dashboard.html">← Dashboard</a></div>

    <div class="main">
        <div class="page-header"><h1>❤️ Vital Signs</h1></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('records')">📋 Vital Records</button>
            <button class="tab" onclick="switchTab('add')">➕ Record Vitals</button>
        </div>

        <!-- RECORDS PANEL -->
        <div id="panel-records" class="panel active">
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Patient</th><th>BP</th><th>Temp (°C)</th><th>Pulse</th><th>SpO2</th><th>Weight (kg)</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="vitalsTableBody"><tr><td colspan="9" style="text-align:center;color:#999;">Loading...</td></tr></tbody></table></div></div>
        </div>

        <!-- ADD VITALS PANEL -->
        <div id="panel-add" class="panel">
            <div class="card">
                <h3>📝 Record Vital Signs</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Patient *</label><select id="vitalPatient"><option value="">Select Patient</option></select></div>
                    <div class="form-group"><label>Blood Pressure</label><input type="text" id="bp" placeholder="e.g., 120/80"></div>
                    <div class="form-group"><label>Temperature (°C)</label><input type="number" id="temperature" placeholder="36.5" step="0.1"></div>
                    <div class="form-group"><label>Pulse Rate (bpm)</label><input type="number" id="pulseRate" placeholder="72" min="0"></div>
                    <div class="form-group"><label>Respiratory Rate</label><input type="number" id="respiratoryRate" placeholder="16" min="0"></div>
                    <div class="form-group"><label>Oxygen Saturation (SpO2 %)</label><input type="number" id="spo2" placeholder="98" min="0" max="100"></div>
                    <div class="form-group"><label>Weight (kg)</label><input type="number" id="weight" placeholder="70" step="0.1"></div>
                    <div class="form-group"><label>Height (cm)</label><input type="number" id="height" placeholder="170" step="0.1"></div>
                    <div class="form-group"><label>Recorded By</label><input type="text" id="recordedBy" placeholder="Nurse name"></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="recordVitals()">💾 Save Vitals</button>
                    <button class="btn btn-primary" onclick="recordVitalsAndNew()">💾 Save & New</button>
                    <button class="btn btn-danger" onclick="switchTab('records')">Cancel</button>
                </div>
            </div>
        </div>

        <!-- RECENT VITALS QUICK VIEW -->
        <div id="latestVitals" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:20px;"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function getVitals() { return JSON.parse(localStorage.getItem('hospital_vitals')) || []; }
        function saveVitals(data) { localStorage.setItem('hospital_vitals', JSON.stringify(data)); }
        function getPatients() { return JSON.parse(localStorage.getItem('hospital_patients')) || []; }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'records') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-records').classList.add('active'); loadVitalsTable(); }
            else { document.querySelector('.tabs .tab:last-child').classList.add('active'); document.getElementById('panel-add').classList.add('active');
                var sel = document.getElementById('vitalPatient'); sel.innerHTML = '<option value="">Select Patient</option>';
                getPatients().forEach(function(p){ sel.innerHTML += '<option value="'+p.id+'">'+p.firstName+' '+p.lastName+' ('+p.id+')</option>'; });
            }
        }

        function recordVitals() {
            var patientId = document.getElementById('vitalPatient').value;
            if (!patientId) { showToast('Select a patient!'); return; }
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var vital = {
                id: 'VIT-' + Date.now(), patientId: patientId,
                patientName: patient ? patient.firstName+' '+patient.lastName : '',
                bp: document.getElementById('bp').value.trim(),
                temperature: parseFloat(document.getElementById('temperature').value) || 0,
                pulseRate: parseInt(document.getElementById('pulseRate').value) || 0,
                respiratoryRate: parseInt(document.getElementById('respiratoryRate').value) || 0,
                spo2: parseInt(document.getElementById('spo2').value) || 0,
                weight: parseFloat(document.getElementById('weight').value) || 0,
                height: parseFloat(document.getElementById('height').value) || 0,
                recordedBy: document.getElementById('recordedBy').value.trim(),
                recordedDate: new Date().toLocaleDateString()
            };
            var vitals = getVitals(); vitals.push(vital); saveVitals(vitals);
            clearVitalForm(); switchTab('records'); showToast('✅ Vitals recorded for ' + vital.patientName);
        }

        function recordVitalsAndNew() {
            var patientId = document.getElementById('vitalPatient').value;
            if (!patientId) { showToast('Select a patient!'); return; }
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var vital = { id: 'VIT-' + Date.now(), patientId: patientId, patientName: patient ? patient.firstName+' '+patient.lastName : '', bp: document.getElementById('bp').value.trim(), temperature: parseFloat(document.getElementById('temperature').value) || 0, pulseRate: parseInt(document.getElementById('pulseRate').value) || 0, respiratoryRate: parseInt(document.getElementById('respiratoryRate').value) || 0, spo2: parseInt(document.getElementById('spo2').value) || 0, weight: parseFloat(document.getElementById('weight').value) || 0, height: parseFloat(document.getElementById('height').value) || 0, recordedBy: document.getElementById('recordedBy').value.trim(), recordedDate: new Date().toLocaleDateString() };
            var vitals = getVitals(); vitals.push(vital); saveVitals(vitals);
            clearVitalForm(); showToast('✅ Saved! Record another.');
        }

        function clearVitalForm() { ['bp','temperature','pulseRate','respiratoryRate','spo2','weight','height','recordedBy'].forEach(function(id){ document.getElementById(id).value = ''; }); }

        function loadVitalsTable() {
            var vitals = getVitals();
            vitals.sort(function(a,b){ return new Date(b.recordedDate) - new Date(a.recordedDate); });
            var tbody = document.getElementById('vitalsTableBody');
            if (vitals.length === 0) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#999;padding:20px;">No vital signs recorded</td></tr>'; return; }
            var html = '';
            vitals.forEach(function(v){
                var bpStatus = 'badge-normal';
                if (v.bp) { var sys = parseInt(v.bp.split('/')[0]) || 0; if (sys > 140) bpStatus = 'badge-high'; if (sys < 90) bpStatus = 'badge-low'; }
                html += '<tr><td><strong>'+v.patientName+'</strong></td><td>'+ (v.bp || '—') +'</td><td>'+(v.temperature||'—')+'</td><td>'+(v.pulseRate||'—')+'</td><td>'+(v.spo2||'—')+'%</td><td>'+(v.weight||'—')+'</td><td>'+v.recordedDate+'</td><td><span class="badge '+bpStatus+'">'+(v.bp ? 'Recorded' : 'Partial')+'</span></td><td><button class="btn-sm btn-del" onclick="deleteVital(\''+v.id+'\')">🗑</button></td></tr>';
            });
            tbody.innerHTML = html;
        }

        function deleteVital(id) { if (!confirm('Delete?')) return; var vitals = getVitals().filter(function(v){ return v.id !== id; }); saveVitals(vitals); loadVitalsTable(); showToast('Deleted.'); }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadVitalsTable(); };
    </script>
</body>
</html>
