<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --primary-light: #ecfeff; --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #2563eb; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        
        .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group.full { grid-column: span 2; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; transition: all 0.2s; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); } .btn-warning { background: var(--warning); }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-scheduled { background: #dbeafe; color: #1e40af; } .badge-completed { background: #d1fae5; color: #065f46; } .badge-cancelled { background: #fee2e2; color: #991b1b; } .badge-waiting { background: #fef3c7; color: #92400e; }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; margin: 1px; }
        .btn-complete { background: #d1fae5; color: #065f46; } .btn-cancel { background: #fee2e2; color: #991b1b; }
        
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="header"><div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div><a href="dashboard.html">← Dashboard</a></div>

    <div class="main">
        <div class="page-header"><h1>📅 Appointments</h1></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('list')">📋 All Appointments</button>
            <button class="tab" onclick="switchTab('new')">➕ New Appointment</button>
        </div>

        <!-- LIST PANEL -->
        <div id="panel-list" class="panel active">
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Date</th><th>Time</th><th>Patient</th><th>Doctor</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead><tbody id="apptTableBody"><tr><td colspan="7" style="text-align:center;color:#999;">Loading...</td></tr></tbody></table></div></div>
        </div>

        <!-- NEW APPOINTMENT PANEL -->
        <div id="panel-new" class="panel">
            <div class="card">
                <h3>📝 Schedule Appointment</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Patient *</label><select id="apptPatient"><option value="">Select Patient</option></select></div>
                    <div class="form-group"><label>Doctor *</label><select id="apptDoctor"><option value="">Select Doctor</option></select></div>
                    <div class="form-group"><label>Date *</label><input type="date" id="apptDate"></div>
                    <div class="form-group"><label>Time *</label><input type="time" id="apptTime"></div>
                    <div class="form-group full"><label>Reason for Visit</label><input type="text" id="apptReason" placeholder="e.g., General checkup, Fever, Follow-up"></div>
                    <div class="form-group full"><label>Notes</label><textarea id="apptNotes" placeholder="Additional notes..."></textarea></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="scheduleAppointment()">💾 Schedule</button>
                    <button class="btn btn-primary" onclick="scheduleAndNew()">💾 Save & New</button>
                    <button class="btn btn-danger" onclick="switchTab('list')">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        function getAppointments() { return JSON.parse(localStorage.getItem('hospital_appointments')) || []; }
        function saveAppointments(data) { localStorage.setItem('hospital_appointments', JSON.stringify(data)); }
        function getPatients() { return JSON.parse(localStorage.getItem('hospital_patients')) || []; }
        function getStaff() { return JSON.parse(localStorage.getItem('hospital_staff')) || []; }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'list') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-list').classList.add('active'); loadAppointmentsTable(); }
            else { document.querySelector('.tabs .tab:last-child').classList.add('active'); document.getElementById('panel-new').classList.add('active'); loadDropdowns(); }
        }

        function loadDropdowns() {
            var pSel = document.getElementById('apptPatient');
            pSel.innerHTML = '<option value="">Select Patient</option>';
            getPatients().forEach(function(p){ pSel.innerHTML += '<option value="'+p.id+'">'+p.firstName+' '+p.lastName+' ('+p.id+')</option>'; });
            
            var dSel = document.getElementById('apptDoctor');
            dSel.innerHTML = '<option value="">Select Doctor</option>';
            getStaff().filter(function(s){ return s.role === 'Doctor'; }).forEach(function(s){ dSel.innerHTML += '<option value="'+s.id+'">'+s.firstName+' '+s.lastName+'</option>'; });
        }

        function scheduleAppointment() {
            var patientId = document.getElementById('apptPatient').value;
            var doctorId = document.getElementById('apptDoctor').value;
            if (!patientId || !doctorId) { showToast('Select patient and doctor!'); return; }
            
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var doctor = getStaff().find(function(s){ return s.id === doctorId; });
            
            var appt = {
                id: 'APT-' + Date.now(),
                patientId: patientId, patientName: patient ? patient.firstName+' '+patient.lastName : '',
                doctorId: doctorId, doctorName: doctor ? doctor.firstName+' '+doctor.lastName : '',
                appointmentDate: document.getElementById('apptDate').value,
                appointmentTime: document.getElementById('apptTime').value,
                reason: document.getElementById('apptReason').value.trim(),
                notes: document.getElementById('apptNotes').value.trim(),
                status: 'Scheduled',
                createdAt: new Date().toLocaleDateString()
            };
            
            var appointments = getAppointments(); appointments.push(appt); saveAppointments(appointments);
            clearApptForm(); switchTab('list');
            showToast('✅ Appointment scheduled for ' + appt.patientName);
        }

        function scheduleAndNew() {
            var patientId = document.getElementById('apptPatient').value;
            var doctorId = document.getElementById('apptDoctor').value;
            if (!patientId || !doctorId) { showToast('Select patient and doctor!'); return; }
            
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var doctor = getStaff().find(function(s){ return s.id === doctorId; });
            
            var appt = { id: 'APT-' + Date.now(), patientId: patientId, patientName: patient ? patient.firstName+' '+patient.lastName : '', doctorId: doctorId, doctorName: doctor ? doctor.firstName+' '+doctor.lastName : '', appointmentDate: document.getElementById('apptDate').value, appointmentTime: document.getElementById('apptTime').value, reason: document.getElementById('apptReason').value.trim(), notes: document.getElementById('apptNotes').value.trim(), status: 'Scheduled', createdAt: new Date().toLocaleDateString() };
            
            var appointments = getAppointments(); appointments.push(appt); saveAppointments(appointments);
            clearApptForm(); showToast('✅ Saved! Schedule another.');
        }

        function clearApptForm() { document.getElementById('apptReason').value = ''; document.getElementById('apptNotes').value = ''; }

        function loadAppointmentsTable() {
            var appointments = getAppointments();
            appointments.sort(function(a,b){ return new Date(b.appointmentDate) - new Date(a.appointmentDate); });
            var tbody = document.getElementById('apptTableBody');
            if (appointments.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;padding:20px;">No appointments</td></tr>'; return; }
            var html = '';
            appointments.forEach(function(a){
                var sc = 'badge-scheduled'; if (a.status==='Completed') sc='badge-completed'; if (a.status==='Cancelled') sc='badge-cancelled'; if (a.status==='Waiting') sc='badge-waiting';
                html += '<tr><td>'+a.appointmentDate+'</td><td>'+a.appointmentTime+'</td><td><strong>'+a.patientName+'</strong></td><td>'+a.doctorName+'</td><td>'+a.reason+'</td><td><span class="badge '+sc+'">'+a.status+'</span></td><td>'+(a.status==='Scheduled' ? '<button class="btn-sm btn-complete" onclick="updateStatus(\''+a.id+'\',\'Completed\')">✅</button> <button class="btn-sm btn-cancel" onclick="updateStatus(\''+a.id+'\',\'Cancelled\')">❌</button>' : '—')+'</td></tr>';
            });
            tbody.innerHTML = html;
        }

        function updateStatus(id, status) {
            var appointments = getAppointments();
            var appt = appointments.find(function(a){ return a.id === id; });
            if (appt) { appt.status = status; saveAppointments(appointments); loadAppointmentsTable(); showToast('Appointment ' + status); }
        }

        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadAppointmentsTable(); };
    </script>
</body>
</html>
