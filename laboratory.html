<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory | Hospital Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0891b2; --primary-dark: #0e7490; --success: #059669; --warning: #d97706; --danger: #dc2626; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header .brand .icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .page-header { margin-bottom: 24px; } .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 5px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
        .card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group.full { grid-column: span 2; }
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; margin: 1px; }
        .btn-result { background: #dbeafe; color: #1e40af; } .btn-del { background: #fee2e2; color: #991b1b; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f1f5f9; color: var(--text-light); padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; } .badge-completed { background: #d1fae5; color: #065f46; }
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="header"><div class="brand"><div class="icon">🏥</div>Hospital<span>Manager</span></div><a href="dashboard.html">← Dashboard</a></div>
    <div class="main">
        <div class="page-header"><h1>🔬 Laboratory</h1></div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('list')">📋 Lab Tests</button>
            <button class="tab" onclick="switchTab('add')">➕ New Test</button>
        </div>

        <div id="panel-list" class="panel active">
            <div class="card"><div style="overflow-x:auto;"><table><thead><tr><th>Lab ID</th><th>Patient</th><th>Test</th><th>Requested</th><th>Result</th><th>Status</th><th>Actions</th></tr></thead><tbody id="labTableBody"><tr><td colspan="7" style="text-align:center;color:#999;">Loading...</td></tr></tbody></table></div></div>
        </div>

        <div id="panel-add" class="panel">
            <div class="card"><h3>📝 Request Lab Test</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Patient *</label><select id="labPatient"><option value="">Select Patient</option></select></div>
                    <div class="form-group"><label>Test Type</label><select id="labTestType"><option value="Blood Test">Blood Test</option><option value="Urine Test">Urine Test</option><option value="X-Ray">X-Ray</option><option value="Ultrasound">Ultrasound</option><option value="COVID-19">COVID-19 Test</option><option value="Malaria">Malaria Test</option><option value="Typhoid">Typhoid Test</option><option value="Other">Other</option></select></div>
                    <div class="form-group full"><label>Notes</label><textarea id="labNotes" placeholder="Additional notes..."></textarea></div>
                </div>
                <div style="display:flex;gap:10px;margin-top:20px;"><button class="btn btn-success" onclick="addLabTest()">💾 Save Test</button><button class="btn btn-danger" onclick="switchTab('list')">Cancel</button></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        function getLabTests() { return JSON.parse(localStorage.getItem('hospital_lab')) || []; }
        function saveLabTests(data) { localStorage.setItem('hospital_lab', JSON.stringify(data)); }
        function getPatients() { return JSON.parse(localStorage.getItem('hospital_patients')) || []; }
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            if (tab === 'list') { document.querySelector('.tabs .tab:first-child').classList.add('active'); document.getElementById('panel-list').classList.add('active'); loadLabTable(); }
            else { document.querySelector('.tabs .tab:last-child').classList.add('active'); document.getElementById('panel-add').classList.add('active');
                var sel = document.getElementById('labPatient'); sel.innerHTML = '<option value="">Select Patient</option>';
                getPatients().forEach(function(p){ sel.innerHTML += '<option value="'+p.id+'">'+p.firstName+' '+p.lastName+'</option>'; });
            }
        }
        function addLabTest() {
            var patientId = document.getElementById('labPatient').value;
            var testType = document.getElementById('labTestType').value;
            if (!patientId) { showToast('Select patient!'); return; }
            var patient = getPatients().find(function(p){ return p.id === patientId; });
            var test = { id: 'LAB-' + Date.now(), patientId: patientId, patientName: patient ? patient.firstName+' '+patient.lastName : '', testType: testType, notes: document.getElementById('labNotes').value.trim(), result: '', status: 'Pending', requestDate: new Date().toLocaleDateString() };
            var tests = getLabTests(); tests.push(test); saveLabTests(tests);
            document.getElementById('labNotes').value = ''; switchTab('list'); showToast('✅ Lab test requested!');
        }
        function loadLabTable() {
            var tests = getLabTests();
            var tbody = document.getElementById('labTableBody');
            if (tests.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;padding:20px;">No lab tests</td></tr>'; return; }
            var html = '';
            tests.forEach(function(t){
                var sc = t.status === 'Completed' ? 'badge-completed' : 'badge-pending';
                html += '<tr><td><strong>'+t.id+'</strong></td><td>'+t.patientName+'</td><td>'+t.testType+'</td><td>'+t.requestDate+'</td><td>'+(t.result || '—')+'</td><td><span class="badge '+sc+'">'+t.status+'</span></td><td>'+(t.status==='Pending' ? '<button class="btn-sm btn-result" onclick="addResult(\''+t.id+'\')">📝 Result</button> ' : '')+'<button class="btn-sm btn-del" onclick="deleteLab(\''+t.id+'\')">🗑</button></td></tr>';
            });
            tbody.innerHTML = html;
        }
        function addResult(id) {
            var result = prompt('Enter test result:');
            if (!result) return;
            var tests = getLabTests();
            var test = tests.find(function(t){ return t.id === id; });
            if (test) { test.result = result; test.status = 'Completed'; saveLabTests(tests); loadLabTable(); showToast('✅ Result added!'); }
        }
        function deleteLab(id) { if (!confirm('Delete?')) return; var tests = getLabTests().filter(function(t){ return t.id !== id; }); saveLabTests(tests); loadLabTable(); showToast('Deleted.'); }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        window.onload = function() { loadLabTable(); };
    </script>
</body>
</html>
